services:
  # ── Backend API ──────────────────────────────────
  - type: web
    name: astra-x-api
    runtime: python
    plan: free
    rootDir: apps/backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from main import init_db; init_db()" && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: astra-x-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://astra-x-frontend.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: TERMINAL3_API_KEY
        sync: false
      - key: TERMINAL3_BASE_URL
        value: https://astra-x-t3-bridge.onrender.com/v1
      - key: TERMINAL3_DID
        sync: false
      - key: MODEL_CACHE_DIR
        value: /tmp/model_cache
      - key: PYTHON_VERSION
        value: "3.11.11"

  # ── Terminal 3 Node.js Bridge ────────────────────
  - type: web
    name: astra-x-t3-bridge
    runtime: node
    plan: free
    rootDir: apps/t3-bridge
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: TERMINAL3_API_KEY
        sync: false
      - key: TERMINAL3_DID
        sync: false

  # ── Frontend Static Site ─────────────────────────
  - type: web
    name: astra-x-frontend
    runtime: static
    rootDir: apps/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://astra-x-api.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff

databases:
  # ── PostgreSQL ───────────────────────────────────
  - name: astra-x-db
    plan: free
    databaseName: astra_x
    postgresMajorVersion: "16"
